{% extends "base.html" %}
{% block titel %}Leiter-Zugang{% endblock %}
{% block content %}

<div class="card" style="max-width: 400px; margin: 60px auto;">
    <h3>Leiter-Zugang</h3>
    <p class="text-muted mb-2">Gib den Leiter-Code ein, um die Einteilungen einzusehen.</p>
    <form method="POST" action="{{ url_for('leiter_login') }}">
        <label for="code">Leiter-Code</label>
        <input type="password" id="code" name="code" required placeholder="Leiter-Code">
        <button type="submit" class="btn btn-primary">Ansicht öffnen</button>
    </form>
</div>

{% endblock %}
